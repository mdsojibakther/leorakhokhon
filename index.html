
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;

      /* 🔥 Background Image */
      background: url('Screenshot_5.jpg') no-repeat center center/cover;
      height: 100vh;
    }

    .box {
      background: rgba(255, 255, 255, 0.9); /* transparent white */
      padding: 30px;
      margin: 100px auto;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 24px;
      font-weight: bold;
      color: #ff4d4d;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Please Wait...</h2>
  <p>Redirecting in <span id="countdown">5</span> seconds</p>

  <button onclick="goNow()">Continue Now</button>

  <p style="margin-top:10px;">
    If not working, <a href="https://www.profitablecpmratenetwork.com/cr431bb217?key=4eeeaaa4a62d6c73807188b29b2d949b">Click here</a>
  </p>
</div>

<script>
  var timeLeft = 5;

  var timer = setInterval(function() {
    timeLeft--;
    document.getElementById("countdown").innerText = timeLeft;

    if(timeLeft <= 0){
      clearInterval(timer);
      window.location.href = "https://www.profitablecpmratenetwork.com/cr431bb217?key=4eeeaaa4a62d6c73807188b29b2d949b";
    }
  }, 1000);

  function goNow(){
    window.location.href = "https://www.profitablecpmratenetwork.com/cr431bb217?key=4eeeaaa4a62d6c73807188b29b2d949b";
  }
</script>

</body>
</html>
